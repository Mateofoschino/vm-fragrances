<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Fragances · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a25b;
    --dark: #0b0907;
    --surface: #141210;
    --card: #1a1713;
    --border: rgba(201,162,91,.2);
    --text: #e8dcc8;
    --muted: rgba(232,220,200,.5);
    --danger: #c0392b;
    --success: #27ae60;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 30%, #1f1a10 0%, #0b0907 70%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    width: 340px;
    text-align: center;
  }
  .login-box h1 { font-size: 1.4rem; letter-spacing: .15em; color: var(--gold); margin-bottom: .3rem; }
  .login-box p  { color: var(--muted); font-size: .85rem; margin-bottom: 1.8rem; }
  .login-box input {
    width: 100%; padding: .75rem 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: inherit;
    font-size: .95rem; margin-bottom: 1rem; outline: none;
  }
  .login-box input:focus { border-color: var(--gold); }
  .btn-gold {
    width: 100%; padding: .8rem; background: var(--gold);
    border: none; border-radius: 6px; color: #0b0907;
    font-family: inherit; font-size: .95rem; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-gold:hover { opacity: .85; }
  #login-error { color: var(--danger); font-size: .82rem; margin-top: .6rem; min-height: 1.2rem; }

  /* ── ADMIN PANEL ── */
  #admin-panel { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1rem; letter-spacing: .15em; color: var(--gold); }
  header span { color: var(--muted); font-size: .8rem; }
  .btn-logout {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: .4rem .9rem; border-radius: 6px;
    font-family: inherit; cursor: pointer; font-size: .82rem;
    transition: border-color .2s, color .2s;
  }
  .btn-logout:hover { border-color: var(--gold); color: var(--text); }

  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ── STATS ── */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.2rem; text-align: center;
  }
  .stat-card .num { font-size: 2rem; font-weight: 600; color: var(--gold); }
  .stat-card .lbl { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .search-input {
    flex: 1; min-width: 220px;
    padding: .6rem 1rem; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: .9rem; outline: none;
  }
  .search-input:focus { border-color: var(--gold); }
  select.filter {
    padding: .6rem .9rem; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: .87rem; outline: none;
    cursor: pointer;
  }
  select.filter:focus { border-color: var(--gold); }
  .btn-add {
    padding: .65rem 1.3rem; background: var(--gold);
    border: none; border-radius: 8px; color: #0b0907;
    font-family: inherit; font-size: .9rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: opacity .2s;
  }
  .btn-add:hover { opacity: .85; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  thead { background: var(--surface); }
  thead th {
    padding: .9rem 1rem; text-align: left;
    color: var(--muted); font-weight: 500;
    letter-spacing: .08em; font-size: .78rem; text-transform: uppercase;
    white-space: nowrap; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--gold); }
  thead th.sorted { color: var(--gold); }
  tbody tr { border-bottom: 1px solid rgba(201,162,91,.07); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(201,162,91,.04); }
  td { padding: .75rem 1rem; vertical-align: middle; }
  td.price { font-weight: 600; color: var(--gold); }
  td.consult { color: var(--muted); font-style: italic; font-size: .83rem; }
  .badge {
    display: inline-block; padding: .2rem .6rem;
    border-radius: 20px; font-size: .72rem; font-weight: 600;
    letter-spacing: .05em;
  }
  .badge-arabe   { background: rgba(201,162,91,.15); color: var(--gold); }
  .badge-dis     { background: rgba(100,150,220,.15); color: #7ab0f0; }
  .badge-nicho   { background: rgba(180,100,200,.15); color: #c880e8; }
  .badge-activo  { background: rgba(39,174,96,.15);   color: #4cd97b; }
  .badge-inactivo{ background: rgba(192,57,43,.15);   color: #e05a4a; }

  .actions { display: flex; gap: .5rem; }
  .btn-icon {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: .35rem .65rem; border-radius: 6px;
    cursor: pointer; font-size: .78rem; transition: all .2s;
  }
  .btn-icon:hover { border-color: var(--gold); color: var(--gold); }
  .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75); z-index: 1000;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; width: 100%; max-width: 540px;
    max-height: 90vh; overflow-y: auto; padding: 2rem;
  }
  .modal h2 { font-size: 1.1rem; color: var(--gold); margin-bottom: 1.5rem; letter-spacing: .1em; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: .4rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: .78rem; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; }
  .form-group input,
  .form-group select {
    padding: .65rem .9rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: inherit; font-size: .9rem; outline: none;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--gold); }
  .modal-footer { display: flex; gap: .8rem; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel {
    padding: .65rem 1.3rem; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: inherit; cursor: pointer;
    transition: all .2s;
  }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  .btn-save {
    padding: .65rem 1.5rem; background: var(--gold);
    border: none; border-radius: 8px; color: #0b0907;
    font-family: inherit; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .btn-save:hover { opacity: .85; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: .8rem 1.2rem;
    font-size: .88rem; color: var(--text);
    opacity: 0; transform: translateY(10px);
    transition: all .3s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok  { border-color: var(--success); }
  #toast.err { border-color: var(--danger); }

  .empty-row td { text-align: center; color: var(--muted); padding: 2.5rem; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    main { padding: 1rem; }
    header { padding: .8rem 1rem; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <h1>VM · ADMIN</h1>
    <p>Acceso exclusivo al panel de gestión</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-gold" onclick="doLogin()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">
  <header>
    <h1>VM FRAGANCES · ADMIN</h1>
    <span id="total-count"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div class="num" id="s-total">–</div><div class="lbl">Total</div></div>
      <div class="stat-card"><div class="num" id="s-arabe">–</div><div class="lbl">Árabe</div></div>
      <div class="stat-card"><div class="num" id="s-dis">–</div><div class="lbl">Diseñador</div></div>
      <div class="stat-card"><div class="num" id="s-nicho">–</div><div class="lbl">Nicho</div></div>
      <div class="stat-card"><div class="num" id="s-inactivo">–</div><div class="lbl">Inactivos</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-input" id="search" placeholder="Buscar por nombre o marca…" oninput="renderTable()">
      <select class="filter" id="f-cat" onchange="renderTable()">
        <option value="">Todas las categorías</option>
        <option>Árabe</option>
        <option>Diseñador</option>
        <option>Nicho</option>
      </select>
      <select class="filter" id="f-gen" onchange="renderTable()">
        <option value="">Todos los géneros</option>
        <option>Hombre</option>
        <option>Mujer</option>
        <option>Unisex</option>
      </select>
      <select class="filter" id="f-activo" onchange="renderTable()">
        <option value="">Todos</option>
        <option value="true">Activos</option>
        <option value="false">Inactivos</option>
      </select>
      <button class="btn-add" onclick="openModal()">+ Agregar perfume</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('n')">Nombre</th>
            <th onclick="sortBy('b')">Marca</th>
            <th onclick="sortBy('ml')">Tamaño</th>
            <th onclick="sortBy('p')">Precio</th>
            <th onclick="sortBy('g')">Género</th>
            <th onclick="sortBy('f')">Familia</th>
            <th onclick="sortBy('cat')">Categoría</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Agregar perfume</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre *</label>
        <input id="f-n" placeholder="Ej: Asad Bourbon">
      </div>
      <div class="form-group">
        <label>Marca *</label>
        <input id="f-b" placeholder="Ej: Lattafa">
      </div>
      <div class="form-group">
        <label>Presentación *</label>
        <input id="f-ml" placeholder="Ej: 100ml">
      </div>
      <div class="form-group">
        <label>Precio (dejar vacío = Consultar)</label>
        <input id="f-p" type="number" placeholder="Ej: 68000">
      </div>
      <div class="form-group">
        <label>Género *</label>
        <select id="f-g">
          <option>Hombre</option>
          <option>Mujer</option>
          <option>Unisex</option>
        </select>
      </div>
      <div class="form-group">
        <label>Familia *</label>
        <select id="f-f">
          <option>Amaderado</option>
          <option>Oriental</option>
          <option>Dulce</option>
          <option>Fresco</option>
          <option>Floral</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoría *</label>
        <select id="f-cat-modal">
          <option>Árabe</option>
          <option>Diseñador</option>
          <option>Nicho</option>
        </select>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="f-activo">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
      <div class="form-group full">
        <label>URL de imagen (opcional)</label>
        <input id="f-img" placeholder="https://…">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="savePerfume()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SUPABASE_URL  = 'https://vmlytkidcbjjnpubtgwa.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtbHl0a2lkY2Jqam5wdWJ0Z3dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2ODE3MDYsImV4cCI6MjA5NjI1NzcwNn0.vt_idckFAuWaCIJWtzaJ0Y2jkgriN9i5av9FEyvsGLU';
// La contraseña del panel (solo frontend — los datos en Supabase son los que cuentan)
const ADMIN_PASSWORD = 'vmadmin2025'; // ← CAMBIÁ ESTO

// ── AUTH ─────────────────────────────────────────────────────
function doLogin() {
  const v = document.getElementById('pwd-input').value;
  if (v === ADMIN_PASSWORD) {
    sessionStorage.setItem('vm_admin', '1');
    showPanel();
  } else {
    document.getElementById('login-error').textContent = 'Contraseña incorrecta';
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function logout() {
  sessionStorage.removeItem('vm_admin');
  location.reload();
}

function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display  = 'block';
  loadData();
}

if (sessionStorage.getItem('vm_admin')) showPanel();

// ── DATA ──────────────────────────────────────────────────────
let allData = [];
let editId  = null;
let sortCol = 'n';
let sortAsc = true;

async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey':        SUPABASE_ANON,
      'Authorization': 'Bearer ' + SUPABASE_ANON,
      'Content-Type':  'application/json',
      'Prefer':        method === 'POST' ? 'return=representation' : 'return=minimal',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

async function loadData() {
  try {
    allData = await api('GET', 'perfumes?order=b.asc,n.asc&select=*');
    updateStats();
    renderTable();
  } catch(e) {
    toast('Error al cargar datos: ' + e.message, 'err');
  }
}

function updateStats() {
  const total = allData.length;
  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-arabe').textContent    = allData.filter(p => p.cat === 'Árabe').length;
  document.getElementById('s-dis').textContent      = allData.filter(p => p.cat === 'Diseñador').length;
  document.getElementById('s-nicho').textContent    = allData.filter(p => p.cat === 'Nicho').length;
  document.getElementById('s-inactivo').textContent = allData.filter(p => !p.activo).length;
  document.getElementById('total-count').textContent = total + ' perfumes en base de datos';
}

// ── SORT ───────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  renderTable();
}

// ── TABLE ─────────────────────────────────────────────────────
function renderTable() {
  const q    = document.getElementById('search').value.toLowerCase();
  const cat  = document.getElementById('f-cat').value;
  const gen  = document.getElementById('f-gen').value;
  const act  = document.getElementById('f-activo').value;

  let list = allData.filter(p => {
    if (q   && !`${p.n} ${p.b}`.toLowerCase().includes(q)) return false;
    if (cat && p.cat !== cat) return false;
    if (gen && p.g   !== gen) return false;
    if (act !== '' && String(p.activo) !== act) return false;
    return true;
  });

  list.sort((a, b) => {
    let va = a[sortCol] ?? '';
    let vb = b[sortCol] ?? '';
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  const fmt = n => n != null ? '$' + n.toLocaleString('es-AR') : null;
  const catBadge = c => {
    const cls = c === 'Árabe' ? 'badge-arabe' : c === 'Diseñador' ? 'badge-dis' : 'badge-nicho';
    return `<span class="badge ${cls}">${c}</span>`;
  };

  const tbody = document.getElementById('tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">Sin resultados</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(p => `
    <tr>
      <td>${p.n}</td>
      <td>${p.b}</td>
      <td>${p.ml}</td>
      <td class="${p.p != null ? 'price' : 'consult'}">${fmt(p.p) ?? 'Consultar'}</td>
      <td>${p.g}</td>
      <td>${p.f}</td>
      <td>${catBadge(p.cat)}</td>
      <td><span class="badge ${p.activo ? 'badge-activo' : 'badge-inactivo'}">${p.activo ? 'Activo' : 'Inactivo'}</span></td>
      <td>
        <div class="actions">
          <button class="btn-icon" onclick="editPerfume(${p.id})">✏️ Editar</button>
          <button class="btn-icon danger" onclick="deletePerfume(${p.id}, '${p.n.replace(/'/g,"\\'")}')">🗑 Borrar</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(p = null) {
  editId = p ? p.id : null;
  document.getElementById('modal-title').textContent = p ? 'Editar perfume' : 'Agregar perfume';
  document.getElementById('f-n').value  = p?.n   ?? '';
  document.getElementById('f-b').value  = p?.b   ?? '';
  document.getElementById('f-ml').value = p?.ml  ?? '100ml';
  document.getElementById('f-p').value  = p?.p   ?? '';
  document.getElementById('f-g').value  = p?.g   ?? 'Hombre';
  document.getElementById('f-f').value  = p?.f   ?? 'Amaderado';
  document.getElementById('f-cat-modal').value = p?.cat ?? 'Árabe';
  document.getElementById('f-activo').value    = p != null ? String(p.activo) : 'true';
  document.getElementById('f-img').value = p?.img ?? '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function editPerfume(id) {
  const p = allData.find(x => x.id === id);
  if (p) openModal(p);
}

async function savePerfume() {
  const body = {
    n:      document.getElementById('f-n').value.trim(),
    b:      document.getElementById('f-b').value.trim(),
    ml:     document.getElementById('f-ml').value.trim(),
    p:      document.getElementById('f-p').value !== '' ? Number(document.getElementById('f-p').value) : null,
    g:      document.getElementById('f-g').value,
    f:      document.getElementById('f-f').value,
    cat:    document.getElementById('f-cat-modal').value,
    activo: document.getElementById('f-activo').value === 'true',
    img:    document.getElementById('f-img').value.trim() || null,
  };

  if (!body.n || !body.b || !body.ml) {
    toast('Nombre, marca y presentación son obligatorios', 'err'); return;
  }

  try {
    if (editId) {
      await api('PATCH', `perfumes?id=eq.${editId}`, body);
      toast('Perfume actualizado ✓', 'ok');
    } else {
      await api('POST', 'perfumes', body);
      toast('Perfume agregado ✓', 'ok');
    }
    closeModal();
    await loadData();
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  }
}

async function deletePerfume(id, nombre) {
  if (!confirm(`¿Borrar "${nombre}"? Esta acción no se puede deshacer.`)) return;
  try {
    await api('DELETE', `perfumes?id=eq.${id}`);
    toast('Perfume eliminado', 'ok');
    await loadData();
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  }
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// Cerrar modal clickando overlay
document.getElementById('modal').addEventListener('click', e => {
